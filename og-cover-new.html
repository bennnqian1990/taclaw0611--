<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d9488 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  position: relative;
  overflow: hidden;
}
/* Background decorations */
.bg-grid {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}
.bg-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, transparent 70%);
  top: -200px;
  right: -100px;
}
.bg-glow-2 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(45,212,191,0.1) 0%, transparent 70%);
  bottom: -100px;
  left: -100px;
}
/* Glass morphism card */
.card {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 60px 100px;
  text-align: center;
  box-shadow: 
    0 25px 50px -12px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
}
/* Top label */
.label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(56,189,248,0.15);
  border: 1px solid rgba(56,189,248,0.3);
  border-radius: 100px;
  padding: 8px 24px;
  margin-bottom: 32px;
}
.label-dot {
  width: 8px;
  height: 8px;
  background: #38bdf8;
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(56,189,248,0.6);
}
.label-text {
  color: #38bdf8;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
}
/* Main title */
.title {
  font-size: 64px;
  font-weight: 800;
  color: #ffffff;
  line-height: 1.2;
  margin-bottom: 16px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.title-accent {
  background: linear-gradient(135deg, #38bdf8 0%, #2dd4bf 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
/* Subtitle */
.subtitle {
  font-size: 28px;
  color: rgba(255,255,255,0.7);
  font-weight: 400;
  margin-bottom: 40px;
}
/* Date */
.date {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 32px;
}
.date-line {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}
.date-text {
  color: rgba(255,255,255,0.5);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 2px;
}
/* Corner decorations */
.corner {
  position: absolute;
  width: 80px;
  height: 80px;
  border: 2px solid rgba(56,189,248,0.2);
}
.corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; border-radius: 16px 0 0 0; }
.corner-tr { top: 40px; right: 40px; border-left: none; border-bottom: none; border-radius: 0 16px 0 0; }
.corner-bl { bottom: 40px; left: 40px; border-right: none; border-top: none; border-radius: 0 0 0 16px; }
.corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; border-radius: 0 0 16px 0; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow-2"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="card">
  <div class="label">
    <div class="label-dot"></div>
    <div class="label-text">WEEKLY REPORT</div>
  </div>
  <div class="title">
    <span class="title-accent">TAClaw</span> & ChatBOT
  </div>
  <div class="subtitle">建设周报</div>
  <div class="date">
    <div class="date-line"></div>
    <div class="date-text">2026.05.15</div>
    <div class="date-line"></div>
  </div>
</div>
</body>
</html>
